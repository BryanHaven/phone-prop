# platformio.ini
# Phone Prop Controller — Build Environments
#
# Production target:  [env:phone-prop]        → custom PCB (ESP32-S3-WROOM-1-N16)
# Dev board target:   [env:waveshare-s3-eth]  → Waveshare ESP32-S3-ETH / POE-ETH
#
# To build for dev board:  pio run -e waveshare-s3-eth
# To build for production: pio run -e phone-prop

# ─── Production PCB ───────────────────────────────────────────────────────────
# Target: Custom PCB with ESP32-S3-WROOM-1-N16
# All buses fully independent — no conflicts.
#
# VSPI  (SPI2): ProSLIC only    — GPIO 10(CS) 11(MOSI) 12(MISO) 13(CLK)
# HSPI  (SPI3): W5500 + SD card — GPIO 14(SD_CS) 15(W5500_CS) 18(CLK) 19(MOSI) 20(MISO)
# I2S:          PCM to ProSLIC  — GPIO 4(PCLK) 5(FSYNC) 6(DRX) 7(DTX)
# W5500 ctrl:                   — GPIO 16(INT) 17(RST)
# ProSLIC ctrl:                 — GPIO 8(RST) 9(INT)
# LED:                          — GPIO 21
[env:phone-prop]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -DMQTT_BROKER_DEFAULT="mqtt://192.168.1.100"
    -DMQTT_TOPIC_BASE="escape/phone"

    ; I2S / PCM — ProSLIC audio codec
    -DI2S_PCLK=4
    -DI2S_FSYNC=5
    -DI2S_DRX=6
    -DI2S_DTX=7

    ; VSPI — ProSLIC SPI control (dedicated bus)
    -DSPI_SLIC_CLK=13
    -DSPI_SLIC_MOSI=11
    -DSPI_SLIC_MISO=12
    -DSPI_SLIC_CS=10
    -DSLIC_RST_GPIO=8
    -DSLIC_INT_GPIO=9

    ; HSPI — W5500 + SD card (shared bus, separate CS)
    -DSPI_HSPI_CLK=18
    -DSPI_HSPI_MOSI=19
    -DSPI_HSPI_MISO=20
    -DSPI_W5500_CS=15
    -DW5500_RST=17
    -DW5500_INT=16
    -DSPI_SD_CS=14

    ; Status LED
    -DLED_GPIO=21

# ─── Waveshare ESP32-S3-ETH / ESP32-S3-POE-ETH Dev Board ─────────────────────
#
# Board: Waveshare ESP32-S3-ETH or ESP32-S3-POE-ETH
# Chip:  ESP32-S3R8 (16MB flash, 8MB PSRAM)
#
# CONFIRMED GPIO MAP (from Waveshare schematic):
#
#   W5500 Ethernet:  CLK=13  MOSI=11  MISO=12  CS=14  INT=10  RST=9
#   SD card (TF):    CS=4    MISO=5   MOSI=6   CLK=7
#   WS2812B LED:     GPIO21
#
# CONFLICT SUMMARY:
#
#   GPIO 4,5,6,7  — Waveshare SD card = Our I2S PCM pins      ✗ CONFLICT
#   GPIO 9–14     — Waveshare W5500   = Our ProSLIC VSPI pins  ✗ CONFLICT (known)
#   GPIO 21       — WS2812B           = Our WS2812B            ✅ perfect match
#
# CONSEQUENCE — Onboard TF slot CANNOT be used with I2S/ProSLIC audio.
#   GPIO 4/5/6/7 are needed for I2S PCM to the ProSLIC.
#   Using the Waveshare TF slot would require disabling I2S entirely.
#   SOLUTION: Use an external microSD breakout wired to free header GPIOs
#   for audio file testing. See DEV-NOTES.md for wiring.
#
# DEVELOPMENT PHASES:
#   Phase 1A: Ethernet + MQTT + WiFi + LED  (no SD, no ProSLIC)
#   Phase 1B: Add external SD breakout on free GPIOs for audio pipeline test
#   Phase 2:  ProSLIC on remapped free GPIOs, WiFi only (Ethernet disabled)
#   Phase 3:  Full integration on custom production PCB
#
# POE SAFETY: Do NOT connect PoE and USB-C simultaneously.
#   No isolation between PoE power and USB ground on this board.
[env:waveshare-s3-eth]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=1              ; ESP32-S3R8: 8MB PSRAM onboard
    -DDEV_BOARD_WAVESHARE_ETH=1      ; Enables board-specific ifdefs in firmware

    -DMQTT_BROKER_DEFAULT="mqtt://192.168.1.100"
    -DMQTT_TOPIC_BASE="escape/phone"

    ; I2S / PCM — production assignments
    ; NOTE: GPIO 4/5/6/7 conflict with Waveshare onboard TF slot.
    ; Do NOT use onboard TF slot while I2S is active.
    ; Use external SD breakout on free GPIOs instead — see DEV-NOTES.md.
    -DI2S_PCLK=4
    -DI2S_FSYNC=5
    -DI2S_DRX=6
    -DI2S_DTX=7

    ; W5500 Ethernet — Waveshare board confirmed pinout
    -DSPI_HSPI_CLK=13
    -DSPI_HSPI_MOSI=11
    -DSPI_HSPI_MISO=12
    -DSPI_W5500_CS=14
    -DW5500_INT=10
    -DW5500_RST=9

    ; SD card — Adafruit MicroSD Breakout+ (ADA254) on external header
    ; GPIO 35-38 confirmed free and broken out on Waveshare header
    -DSPI_SD_CLK=35
    -DSPI_SD_MOSI=36
    -DSPI_SD_MISO=37
    -DSPI_SD_CS=38

    ; ProSLIC SPI — conflicts with W5500 (Phase 2 only, Ethernet disabled)
    ; Remap to free GPIOs for Phase 2. See DEV-NOTES.md for remap table.
    ; These are placeholders matching production — update for Phase 2 remap.
    -DSPI_SLIC_CLK=13                ; CONFLICTS with W5500 — remap for Phase 2
    -DSPI_SLIC_MOSI=11               ; CONFLICTS with W5500 — remap for Phase 2
    -DSPI_SLIC_MISO=12               ; CONFLICTS with W5500 — remap for Phase 2
    -DSPI_SLIC_CS=10                 ; CONFLICTS with W5500 — remap for Phase 2
    -DSLIC_RST_GPIO=9                ; CONFLICTS with W5500_RST — remap for Phase 2
    -DSLIC_INT_GPIO=8                ; Free — OK for Phase 2

    ; Status LED — GPIO21 onboard WS2812B matches production exactly
    -DLED_GPIO=21

# ─── Waveshare: Phase 2 — ProSLIC only (WiFi, no Ethernet) ───────────────────
#
# Ethernet disabled — W5500 and ProSLIC share GPIO 9–13 on the Waveshare board.
# ProSLIC remapped to free header GPIOs (verify before populating).
# See DEV-NOTES.md for remap rationale and strapping pin warnings.
#
# TODO before enabling:
#   - Verify GPIO 39-42 are free and broken out on the Waveshare header
#   - Confirm GPIO45 does not affect boot (strapping pin on ESP32-S3)
#   - Add #ifdef PHASE2_PROSLIC_ONLY guard in network_manager.c to skip W5500 init
[env:waveshare-proslic-only]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=1
    -DDEV_BOARD_WAVESHARE_ETH=1
    -DPHASE2_PROSLIC_ONLY=1           ; Disables W5500 init, enables WiFi-only MQTT

    -DMQTT_BROKER_DEFAULT="mqtt://192.168.1.100"
    -DMQTT_TOPIC_BASE="escape/phone"

    ; I2S unchanged from production
    -DI2S_PCLK=4
    -DI2S_FSYNC=5
    -DI2S_DRX=6
    -DI2S_DTX=7

    ; ProSLIC remapped to free header GPIOs — VERIFY before use
    -DSPI_SLIC_CLK=39
    -DSPI_SLIC_MOSI=40
    -DSPI_SLIC_MISO=41
    -DSPI_SLIC_CS=42
    -DSLIC_RST_GPIO=45                ; ⚠ strapping pin — verify boot behaviour
    -DSLIC_INT_GPIO=8

    ; SD card on Adafruit ADA254 breakout — GPIO 35-38 confirmed
    -DSPI_SD_CLK=35
    -DSPI_SD_MOSI=36
    -DSPI_SD_MISO=37
    -DSPI_SD_CS=38

    ; W5500 — define pins but init is skipped when PHASE2_PROSLIC_ONLY=1
    -DSPI_HSPI_CLK=13
    -DSPI_HSPI_MOSI=11
    -DSPI_HSPI_MISO=12
    -DSPI_W5500_CS=14
    -DW5500_INT=10
    -DW5500_RST=9

    -DLED_GPIO=21
